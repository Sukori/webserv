
server {
	listen localhost:8080

	root /core

	client_max_body_size 1K
}

server {
	listen 0.0.0.0:8081

	server_name weebserv

	root /

	index index.html home.html index.php home.php;

	access_logs /logs/logfiles/access.log

	error_logs /logs/logfiles/error.log

	client_max_body_size 50M
			    #2147483647 int_max
	
	cgi_bin {
		py	/usr/bin/python3;
		php	/usr/bin/php-cgi;
	}

	error_pages {
		204 /www/error_pages/204.html;
		404 /www/error_pages/404.html;
		403 /www/error_pages/403.html;
		405 /www/error_pages/405.html;
		406 /www/error_pages/406.html;
	}

	location / {
		root /www/html
        limit_except GET POST;

		alias home
		autoindex true
    }

	location /hello {
		root /www/test
	}

	location /uploads {
        limit_except POST DELETE;

		root /uploads

		alias dropbox

        upload_path /uploads
    }

	location /www {
		root /www
		
	}

	location /tests {
		root /
		return {
			https://matias.me/nsfw/;
		}
	}
	
	location /bapple {
		root /www/bapple
	}
}

server {
	listen localhost:8082

	root /core

	client_max_body_size 0
}
