
server { # this server has no location and won't do much
	listen localhost:8080

	server_name ouais-bserv

	root /www/8080

	client_max_body_size 1K
}

server { # the main server to test
	listen 0.0.0.0:8081

	server_name weebserv

	root /www/8081

	index index.html home.html index.php home.php;

	client_max_body_size 50M

	cgi_bin          {
		py	/usr/bin/python3;
		php	/usr/bin/php-cgi;
	}

	error_pages {
		204 /site/error_pages/204.html;
	}

	location / {
		root /site

        limit_except GET POST;

		alias home

		autoindex true
    }

	location /hello {
		root /site/html/files

		autoindex true
	}

	location /uploads {
        limit_except POST DELETE;

		root /uploads

		#return 302 /www/8081/site/html

		alias dropbox

		autoindex false

        upload_path /uploads
    }

	location /tests {
		root /site
		return {
			https://matias.me/nsfw/;
		}
	}
	
	location /bapple {
		root /site/bapple
	}
}

server { # this server also has nothing special to do
	listen localhost:8082

	root /www/8082

	error_pages {
		404 webserv/www/default_error_pages/404.html;
	}

	client_max_body_size 0
}
