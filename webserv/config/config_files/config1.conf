# Config template (nginx) This config file is intended to fail to start a server
server {

    # --- Base Block ---
	
    listen 80 # and 8081, 8082, 8083 for instance. no ip address accepted in this project

    root /www/

    index index.html index.htm index.php;

    access_logs /core/logs/logfiles/access.log
	error_logs /core/logs/logfiles/error.log

    client_max_body_size 1k # 1 kilobytes

    error_pages {
		404 /404_custom.html;
	}


    # --- Location Blocks (Routing Rules) ---
    location /{
		root /

        limit_except GET POST;
        
		autoindex false
    }

    location /tests {
		root /
        return {
			301 /new_page.html; # permanent redirect
			403; # return error on forbidden action
		}
    }

    location /uploads {
        limit_except POST LOL MANGE;

		root /uploads/

		alias /uploads/

        upload_path /uploads

    }
}

server {
	listen 8082

	root /core

	client_max_body_size 1K

	location /not-valid-route {
		root /
	}
}